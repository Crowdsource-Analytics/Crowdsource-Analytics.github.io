  <!-- Cardinal dots -->
  <circle cx="16" cy="2"  r="1.2" fill="#5b9bbf" opacity="0.4"/>
  <circle cx="30" cy="16" r="1.2" fill="#5b9bbf" opacity="0.4"/>
