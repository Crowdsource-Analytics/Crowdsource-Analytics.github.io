  <circle cx="16" cy="16" r="14" stroke="#5b9bbf" stroke-width="0.8" fill="none" opacity="0.25"/>
  <circle cx="16" cy="16" r="10" stroke="#5b9bbf" stroke-width="0.8" fill="none" opacity="0.45"/>
  <circle cx="16" cy="16" r="6"  stroke="#5b9bbf" stroke-width="0.8" fill="none" opacity="0.7"/>
  <circle cx="16" cy="16" r="2.5" stroke="#5b9bbf" stroke-width="0.8" fill="none"/>
